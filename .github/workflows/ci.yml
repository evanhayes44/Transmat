name: CI

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: "npm"

            - name: Install dependencies
              run: npm install

            - name: Lint
              run: npm run lint

            - name: Test
              run: npm run test:run

            - name: Build
              run: npm run build
              env:
                  VITE_BUNGIE_API_KEY: ${{ secrets.VITE_BUNGIE_API_KEY }}
                  VITE_BUNGIE_CLIENT_ID: ${{ secrets.VITE_BUNGIE_CLIENT_ID }}
                  VITE_REDIRECT_URI: ${{ secrets.VITE_REDIRECT_URI }}
